name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Unit Tests
      run: |
        pytest tests/test_unit_tasks.py -v --tb=short
    
    - name: Run Smoke Tests
      run: |
        pytest tests/test_smoke_tasks.py -v --tb=short
    
    - name: Run Regression Tests
      run: |
        pytest tests/test_regression_tasks.py -v --tb=short
    
    - name: Run Performance Tests
      run: |
        pytest tests/test_performance_tasks.py -v --tb=short
    
    - name: Run all tests with coverage
      run: |
        pytest --cov=src --cov-report=xml --cov-report=html -v
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint flake8 black isort
    
    - name: Run Black (Code Formatting)
      run: black --check --diff src/ tests/ || true
    
    - name: Run isort (Import Sorting)
      run: isort --check-only --diff src/ tests/ || true
    
    - name: Run Flake8 (Linting)
      run: flake8 src/ tests/ --count --statistics --show-source || true
    
    - name: Run Pylint (Code Analysis)
      run: pylint src/ --fail-under=8.0 || true

  build:
    runs-on: ubuntu-latest
    needs: [test, code-quality]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install wheel twine
    
    - name: Build package
      run: |
        python -m pip install --upgrade build
        python -m build
    
    - name: Check build
      run: |
        python -m twine check dist/*

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run Bandit security scan
      run: bandit -r src/ -v || true
    
    - name: Check dependencies for vulnerabilities
      run: safety check || true
