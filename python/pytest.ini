[pytest]
# Configuración de pytest
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones de ejecución
addopts = 
    -v
    --strict-markers
    --tb=short

# Markers personalizados
markers =
    unit: tests unitarios rápidos
    integration: tests de integración
    mutation: tests de mutación
    slow: tests lentos
